name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The test suite is fully offline and touches only the pure-Python
      # feature/model code, which needs just numpy + pandas — no nba_api,
      # no network, no cached data.
      - name: Install test dependencies
        run: python3 -m pip install "numpy>=1.24" "pandas>=2.0"

      - name: Run unit tests
        run: python3 -m unittest discover tests
